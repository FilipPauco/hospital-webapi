apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- deployment.yaml
- service.yaml

configMapGenerator:
  - name: xpaucof-hospital-webapi-mongodb-init
    files:
      - params/init-db.js
  - name: xpaucof-hospital-webapi-config
    literals:
      - database=xpaucof-hospital
      - collection=ward
patches:
- path: patches/webapi.deployment.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: xpaucof-hospital-webapi
